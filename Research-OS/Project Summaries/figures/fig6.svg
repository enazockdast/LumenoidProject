<svg viewBox="0 0 780 230" width="780" height="230" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif" role="img">
  <title>Scientific ML pipeline: Phase 1 hypothesis-driven, Phase 2a parameter inference, Phase 2b equation discovery</title>
  <defs>
    <marker id="e-gray" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#444"/>
    </marker>
    <marker id="e-blue" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#3949AB"/>
    </marker>
  </defs>

  <!-- Phase labels -->
  <text x="160" y="18" text-anchor="middle" font-size="12" font-weight="bold" fill="#333">Phase 1  —  Hypothesis-Driven  (now)</text>
  <text x="510" y="18" text-anchor="middle" font-size="12" font-weight="bold" fill="#1A237E">Phase 2  —  Scientific ML</text>

  <!-- Phase 1 background -->
  <rect x="8" y="25" width="350" height="195" rx="8" fill="#F9F9F9" stroke="#999" stroke-width="1.5"/>

  <!-- Phase 2a background -->
  <rect x="388" y="25" width="182" height="195" rx="8" fill="#EEF0FB" stroke="#3949AB" stroke-width="1.5"/>
  <!-- Phase 2b background -->
  <rect x="582" y="25" width="190" height="195" rx="8" fill="#E8EAF6" stroke="#3949AB" stroke-width="2" stroke-dasharray="6,3"/>

  <!-- Phase 2a/2b sub-labels -->
  <text x="479" y="43" text-anchor="middle" font-size="10" font-weight="bold" fill="#1A237E">Phase 2a</text>
  <text x="479" y="55" text-anchor="middle" font-size="9" fill="#1A237E">Parameter Inference</text>
  <text x="479" y="66" text-anchor="middle" font-size="8.5" fill="#555">(near-term)</text>

  <text x="677" y="43" text-anchor="middle" font-size="10" font-weight="bold" fill="#1A237E">Phase 2b</text>
  <text x="677" y="55" text-anchor="middle" font-size="9" fill="#1A237E">Equation Discovery</text>
  <text x="677" y="66" text-anchor="middle" font-size="8.5" fill="#888" font-style="italic">label-free pipeline →</text>

  <!-- Phase 1 boxes (horizontal flow) -->
  <!-- Experiment -->
  <rect x="20" y="80" width="68" height="50" rx="5" fill="#fff" stroke="#888" stroke-width="1.5"/>
  <text x="54" y="102" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#333">Experi-</text>
  <text x="54" y="115" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#333">ment</text>
  <line x1="88" y1="105" x2="100" y2="105" stroke="#444" stroke-width="1.5" marker-end="url(#e-gray)"/>

  <!-- Segment / Track -->
  <rect x="100" y="80" width="68" height="50" rx="5" fill="#fff" stroke="#888" stroke-width="1.5"/>
  <text x="134" y="99" text-anchor="middle" font-size="9" font-weight="bold" fill="#333">Segment</text>
  <text x="134" y="111" text-anchor="middle" font-size="9" fill="#333">&amp; Track</text>
  <text x="134" y="123" text-anchor="middle" font-size="8" fill="#666">nuclear, actin</text>
  <line x1="168" y1="105" x2="180" y2="105" stroke="#444" stroke-width="1.5" marker-end="url(#e-gray)"/>

  <!-- Hypothesis -->
  <rect x="180" y="80" width="68" height="50" rx="5" fill="#fff" stroke="#888" stroke-width="1.5"/>
  <text x="214" y="102" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#333">Hypo-</text>
  <text x="214" y="115" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#333">thesis</text>
  <line x1="248" y1="105" x2="260" y2="105" stroke="#444" stroke-width="1.5" marker-end="url(#e-gray)"/>

  <!-- Forward model -->
  <rect x="260" y="80" width="85" height="50" rx="5" fill="#fff" stroke="#888" stroke-width="1.5"/>
  <text x="302" y="99" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#333">Forward</text>
  <text x="302" y="112" text-anchor="middle" font-size="9.5" font-weight="bold" fill="#333">Model</text>
  <text x="302" y="124" text-anchor="middle" font-size="8" fill="#666">continuum/vertex</text>

  <!-- Phase 1 cycle arrow (feedback) -->
  <path d="M302,130 Q302,185 175,195 Q60,205 54,130" fill="none" stroke="#888" stroke-width="1.5" stroke-dasharray="4,3" marker-end="url(#e-gray)"/>
  <text x="175" y="210" text-anchor="middle" font-size="8.5" fill="#666">fast cycles → identifies key parameters</text>

  <!-- Arrow into Phase 2a -->
  <line x1="347" y1="105" x2="387" y2="105" stroke="#3949AB" stroke-width="2.5" marker-end="url(#e-blue)"/>
  <text x="367" y="96" text-anchor="middle" font-size="8" fill="#3949AB">data</text>
  <text x="367" y="107" text-anchor="middle" font-size="8" fill="#3949AB">at scale</text>

  <!-- Phase 2a content -->
  <text x="479" y="95" text-anchor="middle" font-size="9" fill="#333">Known model form</text>
  <!-- Input fields -->
  <rect x="403" y="103" width="150" height="22" rx="3" fill="#C5CAE9" stroke="#3949AB" stroke-width="1"/>
  <text x="478" y="118" text-anchor="middle" font-size="8.5" fill="#1A237E">v(x,t), actin, cadherin fields</text>
  <line x1="478" y1="125" x2="478" y2="137" stroke="#3949AB" stroke-width="1.5" marker-end="url(#e-blue)"/>
  <!-- Output params -->
  <rect x="403" y="137" width="150" height="28" rx="3" fill="#E8EAF6" stroke="#3949AB" stroke-width="1.5"/>
  <text x="478" y="150" text-anchor="middle" font-size="9" font-weight="bold" fill="#1A237E">ζ, κ, K, γv₀</text>
  <text x="478" y="163" text-anchor="middle" font-size="8" fill="#555">E(q), J_ij, Λ_ij</text>
  <!-- Phase diagram note -->
  <line x1="478" y1="165" x2="478" y2="177" stroke="#3949AB" stroke-width="1.5" marker-end="url(#e-blue)"/>
  <rect x="400" y="177" width="158" height="28" rx="3" fill="#9FA8DA" stroke="#3949AB" stroke-width="1.5"/>
  <text x="479" y="190" text-anchor="middle" font-size="9" font-weight="bold" fill="#1A237E">Parameter landscape</text>
  <text x="479" y="203" text-anchor="middle" font-size="8" fill="#fff">across perturbation series</text>

  <!-- Arrow into Phase 2b -->
  <line x1="571" y1="155" x2="581" y2="155" stroke="#3949AB" stroke-width="2" marker-end="url(#e-blue)"/>
  <text x="576" y="146" text-anchor="middle" font-size="7.5" fill="#3949AB">large</text>
  <text x="576" y="156" text-anchor="middle" font-size="7.5" fill="#3949AB">dataset</text>

  <!-- Phase 2b content -->
  <text x="677" y="95" text-anchor="middle" font-size="9" fill="#555">No assumed model form</text>
  <rect x="597" y="103" width="160" height="22" rx="3" fill="#9FA8DA" stroke="#3949AB" stroke-width="1"/>
  <text x="677" y="118" text-anchor="middle" font-size="8.5" fill="#1A237E">microscopy video library</text>
  <line x1="677" y1="125" x2="677" y2="137" stroke="#3949AB" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#e-blue)"/>
  <rect x="597" y="137" width="160" height="22" rx="3" fill="#7986CB" stroke="#3949AB" stroke-width="1.5"/>
  <text x="677" y="152" text-anchor="middle" font-size="8.5" fill="#fff">SINDy / PINN discovery</text>
  <line x1="677" y1="159" x2="677" y2="171" stroke="#3949AB" stroke-width="1.5" stroke-dasharray="4,2" marker-end="url(#e-blue)"/>
  <rect x="597" y="171" width="160" height="38" rx="3" fill="#5C6BC0" stroke="#3949AB" stroke-width="1.5"/>
  <text x="677" y="185" text-anchor="middle" font-size="9" font-weight="bold" fill="#fff">Governing equations</text>
  <text x="677" y="198" text-anchor="middle" font-size="8" fill="#E8EAF6">which fields are sufficient?</text>
  <text x="677" y="209" text-anchor="middle" font-size="8" fill="#E8EAF6">actin? cadherin? mitosis?</text>
</svg>