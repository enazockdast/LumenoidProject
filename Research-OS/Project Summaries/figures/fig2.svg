<svg viewBox="0 0 780 260" width="780" height="260" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif" role="img">
  <title>LumenoidGrowth mechanism: growth-compression-thickening and perturbation routes</title>
  <defs>
    <marker id="a-red" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#C62828"/>
    </marker>
    <marker id="a-blue" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#1565C0"/>
    </marker>
    <marker id="a-gray" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#555"/>
    </marker>
    <marker id="a-grn" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#2E7D32"/>
    </marker>
    <!-- Clip for epithelium annulus -->
    <clipPath id="epi-clip">
      <rect x="0" y="0" width="210" height="260"/>
    </clipPath>
  </defs>

  <!-- ── Panel A: Lumenoid cross-section ── -->
  <text x="105" y="18" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Cross-section</text>

  <!-- Basement membrane -->
  <circle cx="105" cy="140" r="84" fill="none" stroke="#795548" stroke-width="2" stroke-dasharray="6,4"/>
  <!-- Epithelial shell -->
  <circle cx="105" cy="140" r="84" fill="#90CAF9" stroke="none"/>
  <circle cx="105" cy="140" r="48" fill="#E3F2FD" stroke="none"/>
  <!-- Lumen -->
  <circle cx="105" cy="140" r="48" fill="#BBDEFB" stroke="#1565C0" stroke-width="1.5"/>

  <!-- Labels -->
  <text x="105" y="138" text-anchor="middle" font-size="10" fill="#0D47A1">Lumen</text>
  <text x="105" y="152" text-anchor="middle" font-size="9" fill="#0D47A1" font-style="italic">osmotic</text>
  <text x="160" y="120" text-anchor="middle" font-size="9" fill="#1A237E" font-weight="bold">Epithelium</text>
  <text x="176" y="175" text-anchor="middle" font-size="8" fill="#5D4037" font-style="italic">BM</text>

  <!-- Growth arrows (outward, red) -->
  <line x1="105" y1="56" x2="105" y2="35" stroke="#C62828" stroke-width="2" marker-end="url(#a-red)"/>
  <line x1="105" y1="224" x2="105" y2="245" stroke="#C62828" stroke-width="2" marker-end="url(#a-red)"/>
  <line x1="21" y1="140" x2="2" y2="140" stroke="#C62828" stroke-width="2" marker-end="url(#a-red)"/>
  <line x1="189" y1="140" x2="208" y2="140" stroke="#C62828" stroke-width="2" marker-end="url(#a-red)"/>
  <text x="105" y="28" text-anchor="middle" font-size="9" fill="#C62828" font-weight="bold">growth</text>

  <!-- Osmotic arrows (inward, blue) -->
  <line x1="80" y1="97" x2="88" y2="105" stroke="#1565C0" stroke-width="1.5" marker-end="url(#a-blue)"/>
  <line x1="130" y1="97" x2="122" y2="105" stroke="#1565C0" stroke-width="1.5" marker-end="url(#a-blue)"/>
  <line x1="80" y1="183" x2="88" y2="175" stroke="#1565C0" stroke-width="1.5" marker-end="url(#a-blue)"/>
  <line x1="130" y1="183" x2="122" y2="175" stroke="#1565C0" stroke-width="1.5" marker-end="url(#a-blue)"/>
  <text x="56" y="143" text-anchor="middle" font-size="8" fill="#1565C0" transform="rotate(-90,56,143)">osmotic</text>

  <!-- ── Panel B: Competition / outcome ── -->
  <line x1="215" y1="20" x2="215" y2="250" stroke="#ddd" stroke-width="1"/>
  <text x="390" y="18" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Competition &amp; Outcome</text>

  <!-- Balance scale concept -->
  <text x="280" y="55" text-anchor="middle" font-size="10" fill="#C62828" font-weight="bold">Cell Growth</text>
  <text x="280" y="70" text-anchor="middle" font-size="9" fill="#C62828">adds volume</text>
  <line x1="280" y1="75" x2="390" y2="100" stroke="#C62828" stroke-width="2" marker-end="url(#a-red)"/>

  <text x="500" y="55" text-anchor="middle" font-size="10" fill="#1565C0" font-weight="bold">Osmotic + Elastic</text>
  <text x="500" y="70" text-anchor="middle" font-size="9" fill="#1565C0">relaxation</text>
  <line x1="500" y1="75" x2="390" y2="100" stroke="#1565C0" stroke-width="2" marker-end="url(#a-blue)"/>

  <!-- When growth > relaxation box -->
  <rect x="310" y="105" width="160" height="38" rx="5" fill="#FFF9C4" stroke="#F9A825" stroke-width="1.5"/>
  <text x="390" y="121" text-anchor="middle" font-size="10" font-weight="bold" fill="#F57F17">growth &gt; relaxation</text>
  <text x="390" y="136" text-anchor="middle" font-size="9" fill="#795548">→ area compression</text>

  <!-- Incompressibility -->
  <line x1="390" y1="143" x2="390" y2="163" stroke="#555" stroke-width="1.5" marker-end="url(#a-gray)"/>
  <rect x="310" y="163" width="160" height="28" rx="5" fill="#FFECB3" stroke="#FF8F00" stroke-width="1.5"/>
  <text x="390" y="178" text-anchor="middle" font-size="9.5" fill="#E65100">cell incompressibility</text>
  <text x="390" y="191" text-anchor="middle" font-size="9" fill="#795548">area ↓  →  thickness ↑</text>

  <!-- Outcome arrow -->
  <line x1="390" y1="195" x2="390" y2="215" stroke="#2E7D32" stroke-width="1.5" marker-end="url(#a-grn)"/>
  <rect x="310" y="215" width="160" height="28" rx="5" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="390" y="232" text-anchor="middle" font-size="10" font-weight="bold" fill="#1B5E20">THICKENING ✓</text>

  <!-- ── Panel C: Perturbation routes ── -->
  <line x1="560" y1="20" x2="560" y2="250" stroke="#ddd" stroke-width="1"/>
  <text x="670" y="18" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Growth-Rate Knobs</text>

  <!-- Three routes -->
  <!-- Rapamycin -->
  <rect x="575" y="32" width="180" height="30" rx="5" fill="#E8EAF6" stroke="#3949AB" stroke-width="1.5"/>
  <text x="665" y="47" text-anchor="middle" font-size="10" font-weight="bold" fill="#1A237E">Rapamycin</text>
  <text x="665" y="58" text-anchor="middle" font-size="8.5" fill="#555">mTOR inhibition</text>

  <!-- Glycolysis -->
  <rect x="575" y="78" width="180" height="30" rx="5" fill="#E8EAF6" stroke="#3949AB" stroke-width="1.5"/>
  <text x="665" y="93" text-anchor="middle" font-size="10" font-weight="bold" fill="#1A237E">Glycolysis inhibitors</text>
  <text x="665" y="104" text-anchor="middle" font-size="8.5" fill="#555">metabolic — 2-DG</text>

  <!-- Dhiraj -->
  <rect x="575" y="124" width="180" height="30" rx="5" fill="#E8EAF6" stroke="#3949AB" stroke-width="1.5"/>
  <text x="665" y="139" text-anchor="middle" font-size="10" font-weight="bold" fill="#1A237E">Dhiraj synthetic circuits</text>
  <text x="665" y="150" text-anchor="middle" font-size="8.5" fill="#555">direct cell-cycle control</text>

  <!-- Bracket and label -->
  <line x1="573" y1="32" x2="566" y2="32" stroke="#555" stroke-width="1.2"/>
  <line x1="566" y1="32" x2="566" y2="154" stroke="#555" stroke-width="1.2"/>
  <line x1="566" y1="154" x2="573" y2="154" stroke="#555" stroke-width="1.2"/>
  <line x1="566" y1="93" x2="556" y2="93" stroke="#555" stroke-width="1.2" marker-end="url(#a-gray)"/>
  <text x="552" y="90" text-anchor="end" font-size="9" fill="#C62828" font-weight="bold">↓ growth</text>
  <text x="552" y="100" text-anchor="end" font-size="9" fill="#2E7D32" font-weight="bold">→ ↓ thickness</text>

  <!-- ZO-1 -->
  <rect x="575" y="175" width="180" height="30" rx="5" fill="#FCE4EC" stroke="#C62828" stroke-width="1.5"/>
  <text x="665" y="190" text-anchor="middle" font-size="10" font-weight="bold" fill="#880E4F">ZO-1 knockdown</text>
  <text x="665" y="201" text-anchor="middle" font-size="8.5" fill="#555">↑ permeability → lumen ↓</text>

  <!-- Mosaic -->
  <rect x="575" y="221" width="180" height="28" rx="5" fill="#FCE4EC" stroke="#C62828" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="665" y="237" text-anchor="middle" font-size="10" font-weight="bold" fill="#880E4F">Mosaic TJP1</text>
  <text x="665" y="248" text-anchor="middle" font-size="8.5" fill="#555">local permeability heterogeneity</text>
</svg>