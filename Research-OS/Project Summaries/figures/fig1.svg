<svg viewBox="0 0 780 305" width="780" height="305" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif" role="img">
  <title>Program architecture: three projects, shared cell state representation, perturbation battery, and SciML pipeline</title>
  <defs>
    <marker id="arr1" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#777"/>
    </marker>
    <marker id="arr-green" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#2E7D32"/>
    </marker>
    <marker id="arr-blue" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#3949AB"/>
    </marker>
  </defs>

  <!-- ── Project boxes ── -->
  <!-- LumenoidGrowth -->
  <rect x="12" y="10" width="218" height="78" rx="7" fill="#E3F2FD" stroke="#1565C0" stroke-width="2"/>
  <text x="121" y="37" text-anchor="middle" font-size="13" font-weight="bold" fill="#0D47A1">LumenoidGrowth</text>
  <text x="121" y="55" text-anchor="middle" font-size="10" fill="#444">Growth · Osmotic transport</text>
  <text x="121" y="70" text-anchor="middle" font-size="10" fill="#444">Shell mechanics · Thickening</text>
  <text x="121" y="83" text-anchor="middle" font-size="9" fill="#888" font-style="italic">manuscript in preparation</text>

  <!-- Cell Shape Dynamics -->
  <rect x="281" y="10" width="218" height="78" rx="7" fill="#F3E5F5" stroke="#6A1B9A" stroke-width="2"/>
  <text x="390" y="33" text-anchor="middle" font-size="13" font-weight="bold" fill="#4A148C">Cell Shape Dynamics</text>
  <text x="390" y="50" text-anchor="middle" font-size="10" fill="#444">Collective flow · INM · Shape</text>
  <text x="390" y="65" text-anchor="middle" font-size="10" fill="#444">Active polar fluid · Geometry</text>
  <text x="390" y="83" text-anchor="middle" font-size="9" fill="#888" font-style="italic">active experiments &amp; modeling</text>

  <!-- CellSorting -->
  <rect x="550" y="10" width="218" height="78" rx="7" fill="#FBE9E7" stroke="#BF360C" stroke-width="2"/>
  <text x="659" y="37" text-anchor="middle" font-size="13" font-weight="bold" fill="#8D1F00">CellSorting</text>
  <text x="659" y="55" text-anchor="middle" font-size="10" fill="#444">Adhesion · Contractility</text>
  <text x="659" y="70" text-anchor="middle" font-size="10" fill="#444">Sorting patterns · Signaling</text>
  <text x="659" y="83" text-anchor="middle" font-size="9" fill="#888" font-style="italic">active experiments &amp; modeling</text>

  <!-- Arrows from projects to Cell State -->
  <line x1="121" y1="88" x2="295" y2="145" stroke="#777" stroke-width="1.5" marker-end="url(#arr1)"/>
  <line x1="390" y1="88" x2="390" y2="145" stroke="#777" stroke-width="1.5" marker-end="url(#arr1)"/>
  <line x1="659" y1="88" x2="487" y2="145" stroke="#777" stroke-width="1.5" marker-end="url(#arr1)"/>

  <!-- Cell State Representation -->
  <rect x="155" y="145" width="470" height="44" rx="7" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2"/>
  <text x="390" y="163" text-anchor="middle" font-size="12" font-weight="bold" fill="#1B5E20">Cell State Representation</text>
  <text x="390" y="181" text-anchor="middle" font-size="9.5" fill="#444">actin · E/N-cadherin · nuclear position · cell-cycle phase · neighbor identities · polarity</text>

  <!-- Arrow down -->
  <line x1="390" y1="189" x2="390" y2="210" stroke="#777" stroke-width="1.5" marker-end="url(#arr1)"/>

  <!-- Shared Perturbation Battery -->
  <rect x="18" y="210" width="744" height="42" rx="6" fill="#F9F9F9" stroke="#999" stroke-width="1.5"/>
  <text x="390" y="226" text-anchor="middle" font-size="11" font-weight="bold" fill="#333">Shared Perturbation Battery</text>
  <text x="390" y="244" text-anchor="middle" font-size="9.5" fill="#555">rapamycin · glycolysis inh. · Dhiraj synthetic circuits · ZO-1 knockdown · ROCK1 / MYH9 / MYH10 · E-cad / N-cad · 2D pre-patterning</text>

  <!-- Arrow down -->
  <line x1="390" y1="252" x2="390" y2="267" stroke="#3949AB" stroke-width="1.5" marker-end="url(#arr-blue)"/>

  <!-- SciML strip: Phase 2a + 2b -->
  <rect x="18" y="267" width="744" height="33" rx="6" fill="#E8EAF6" stroke="#3949AB" stroke-width="1.5"/>
  <!-- Phase 2a -->
  <rect x="28" y="272" width="340" height="23" rx="4" fill="#C5CAE9" stroke="none"/>
  <text x="198" y="287" text-anchor="middle" font-size="10" font-weight="bold" fill="#1A237E">Phase 2a  —  Parameter Inference (near-term)</text>
  <!-- Arrow -->
  <text x="378" y="288" text-anchor="middle" font-size="15" fill="#3949AB">→</text>
  <!-- Phase 2b -->
  <rect x="392" y="272" width="360" height="23" rx="4" fill="#9FA8DA" stroke="none"/>
  <text x="572" y="287" text-anchor="middle" font-size="10" font-weight="bold" fill="#1A237E">Phase 2b  —  Equation Discovery (label-free pipeline)</text>
</svg>