<svg viewBox="0 0 780 270" width="780" height="270" xmlns="http://www.w3.org/2000/svg" font-family="Arial, sans-serif" role="img">
  <title>CellSorting: feedback loop from cell state through mechanics to rearrangement and signaling, and energy landscape with pattern basins</title>
  <defs>
    <marker id="d-orange" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#BF360C"/>
    </marker>
    <marker id="d-gray" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#555"/>
    </marker>
    <marker id="d-blue" viewBox="0 0 8 8" refX="7" refY="4" markerWidth="5" markerHeight="5" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="#1565C0"/>
    </marker>
  </defs>

  <!-- ── Left: Feedback loop ── -->
  <text x="175" y="16" text-anchor="middle" font-size="11" font-weight="bold" fill="#8D1F00">Sorting Feedback Loop</text>

  <!-- Central cycle — 5 nodes in a pentagon arrangement -->
  <!-- Node positions (cx, cy):
       Cell State: 175, 80
       Mechanics:  265, 140
       Rearrangement: 230, 220
       Neighbors: 120, 220
       Signaling:  85, 140  -->

  <!-- Nodes -->
  <rect x="118" y="60" width="115" height="36" rx="18" fill="#FBE9E7" stroke="#BF360C" stroke-width="2"/>
  <text x="175" y="82" text-anchor="middle" font-size="10" font-weight="bold" fill="#8D1F00">Cell State</text>

  <rect x="228" y="118" width="110" height="36" rx="18" fill="#FBE9E7" stroke="#BF360C" stroke-width="2"/>
  <text x="283" y="133" text-anchor="middle" font-size="10" font-weight="bold" fill="#8D1F00">Adhesion /</text>
  <text x="283" y="148" text-anchor="middle" font-size="10" font-weight="bold" fill="#8D1F00">Contractility</text>

  <rect x="183" y="210" width="120" height="36" rx="18" fill="#FBE9E7" stroke="#BF360C" stroke-width="2"/>
  <text x="243" y="232" text-anchor="middle" font-size="10" font-weight="bold" fill="#8D1F00">Rearrangement</text>

  <rect x="57" y="210" width="110" height="36" rx="18" fill="#FBE9E7" stroke="#BF360C" stroke-width="2"/>
  <text x="112" y="232" text-anchor="middle" font-size="10" font-weight="bold" fill="#8D1F00">New Neighbors</text>

  <rect x="20" y="118" width="110" height="36" rx="18" fill="#FBE9E7" stroke="#BF360C" stroke-width="2"/>
  <text x="75" y="133" text-anchor="middle" font-size="10" font-weight="bold" fill="#8D1F00">Signaling /</text>
  <text x="75" y="148" text-anchor="middle" font-size="10" font-weight="bold" fill="#8D1F00">Fate</text>

  <!-- Connecting arrows (curved, around the loop) -->
  <path d="M233,78 Q268,95 263,120" fill="none" stroke="#BF360C" stroke-width="2" marker-end="url(#d-orange)"/>
  <path d="M310,155 Q315,190 300,213" fill="none" stroke="#BF360C" stroke-width="2" marker-end="url(#d-orange)"/>
  <path d="M183,230 Q158,245 145,245 Q130,245 112,246" fill="none" stroke="#BF360C" stroke-width="2" marker-end="url(#d-orange)"/>
  <path d="M70,210 Q58,190 57,157" fill="none" stroke="#BF360C" stroke-width="2" marker-end="url(#d-orange)"/>
  <path d="M110,118 Q128,95 118,80" fill="none" stroke="#BF360C" stroke-width="2" marker-end="url(#d-orange)"/>

  <!-- DOX perturbation arrow into Cell State -->
  <line x1="175" y1="25" x2="175" y2="58" stroke="#1565C0" stroke-width="2" marker-end="url(#d-blue)" stroke-dasharray="5,3"/>
  <text x="193" y="35" font-size="9" fill="#1565C0" font-weight="bold">DOX on/off</text>
  <text x="193" y="46" font-size="8" fill="#1565C0">N-cad ↑ / ↓</text>

  <!-- Actomyosin perturbation into Mechanics -->
  <line x1="350" y1="130" x2="340" y2="138" stroke="#1565C0" stroke-width="2" marker-end="url(#d-blue)" stroke-dasharray="5,3"/>
  <text x="355" y="122" font-size="9" fill="#1565C0" font-weight="bold">ROCK1/MYH9</text>
  <text x="355" y="133" font-size="8" fill="#1565C0">contractility ↓</text>

  <!-- ── Right: Energy landscape ── -->
  <line x1="390" y1="15" x2="390" y2="265" stroke="#e0e0e0" stroke-width="1"/>
  <text x="585" y="16" text-anchor="middle" font-size="11" font-weight="bold" fill="#8D1F00">Sorting Energy Landscape</text>

  <!-- Axes -->
  <line x1="410" y1="220" x2="770" y2="220" stroke="#555" stroke-width="1.5" marker-end="url(#d-gray)"/>
  <line x1="410" y1="220" x2="410" y2="30" stroke="#555" stroke-width="1.5" marker-end="url(#d-gray)"/>
  <text x="590" y="240" text-anchor="middle" font-size="10" fill="#555">cell configuration space</text>
  <text x="392" y="125" text-anchor="middle" font-size="10" fill="#555" transform="rotate(-90,392,125)">E(config)</text>

  <!-- Energy curve with three basins -->
  <path d="M420,80 Q445,175 475,120 Q500,70 530,115 Q555,155 580,105 Q605,60 635,110 Q660,155 690,100 Q715,55 750,80"
        fill="none" stroke="#BF360C" stroke-width="2.5"/>

  <!-- Basin 1: mixed (metastable) -->
  <circle cx="475" cy="120" r="5" fill="#BF360C"/>
  <text x="475" y="148" text-anchor="middle" font-size="9" fill="#8D1F00" font-weight="bold">mixed</text>
  <text x="475" y="160" text-anchor="middle" font-size="8" fill="#666">(initial)</text>

  <!-- Basin 2: sorted (stable) -->
  <circle cx="580" cy="105" r="5" fill="#BF360C"/>
  <text x="580" y="80" text-anchor="middle" font-size="9" fill="#8D1F00" font-weight="bold">sorted</text>
  <text x="580" y="91" text-anchor="middle" font-size="8" fill="#666">domains</text>

  <!-- Basin 3: salt-and-pepper -->
  <circle cx="690" cy="100" r="5" fill="#BF360C"/>
  <text x="710" y="95" text-anchor="start" font-size="9" fill="#8D1F00" font-weight="bold">salt-&amp;</text>
  <text x="710" y="107" text-anchor="start" font-size="9" fill="#8D1F00" font-weight="bold">pepper</text>
  <text x="710" y="119" text-anchor="start" font-size="8" fill="#666">(signaling)</text>

  <!-- DOX washout: moves from sorted back toward mixed -->
  <path d="M580,100 Q545,75 510,90 Q490,98 480,118" fill="none" stroke="#1565C0" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#d-blue)"/>
  <text x="526" y="72" text-anchor="middle" font-size="8.5" fill="#1565C0">DOX washout</text>
  <text x="526" y="82" text-anchor="middle" font-size="8" fill="#1565C0">(if fluid)</text>

  <!-- Jammed regime: arrow stays in basin -->
  <path d="M577,105 Q585,122 578,128 Q570,133 575,120" fill="none" stroke="#E65100" stroke-width="1.5" stroke-dasharray="3,2" marker-end="url(#d-orange)"/>
  <text x="598" y="148" text-anchor="middle" font-size="8" fill="#E65100">jammed:</text>
  <text x="598" y="158" text-anchor="middle" font-size="8" fill="#E65100">persists</text>

  <!-- Phase 2a label -->
  <rect x="412" y="185" width="350" height="22" rx="4" fill="#E8EAF6" stroke="#3949AB" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="587" y="200" text-anchor="middle" font-size="9" fill="#1A237E">Phase 2a: infer E(N-cad, E-cad, actin) from mosaic lumenoid videos</text>
</svg>